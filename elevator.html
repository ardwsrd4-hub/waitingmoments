<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>elevator</title>

<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      overflow-x: hidden;
    }

    .title{
      width:300px;
      margin:50px auto;
      display:block;
    }

    .elevator{
      position:absolute;
      left:50%;
      transform:translate(-50%, 10%);
      width: 450px;
    }


</style>

</head>

<body>


<img src="images/elevator.png" class="elevator"> 






</body>
</html>
