<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>about</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: white;
  overflow-x: hidden;
}

.main {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: white;
}

/* 상단 바 */
.menu-bar {
  position: fixed;
  top: 0;
  left: 0;

  width: 100vw;
  height: 90px;

  background: white;
  border-bottom: 1px solid black;

  z-index: 9998;
}



/* 메뉴 공통 */
.menu-wrap {
  position: fixed;
  cursor: pointer;
  z-index: 9999;
  text-decoration: none;
  display: block;
}

.menu-img {
  width: 100%;
  display: block;
}

/* hover 이미지 */
.hover-img {
  position: absolute;
  bottom: 95%;
  left: 50%;
  transform: translateX(-50%);

  width: 20px;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.menu-wrap:hover .hover-img {
  opacity: 1;
}

/* 메뉴 위치 */
.menu-01-wrap {
  left: 30px;
  top: 28px;
  width: 35px;
}

.menu-03-wrap {
  right: 95px;
  top: 19px;
  width: 55px;
}

.menu-04-wrap {
  right: 20px;
  top: 19px;
  width: 55px;
}
/* 슬라이드 */
.slider {
  position: absolute;
  left: 50%;
  top: 30%;
  transform: translate(-50%, -50%);

  width: 100%;
  overflow: hidden;
  z-index: 1;
  opacity:0%;
}

.slider-2 {
  position: absolute;
  left: 50%;
  top: %;
  transform: translate(-50%, -50%);

  width: 100%;
  overflow: hidden;
  z-index: 1;
  opacity:0%;
}

.slide-track {
  display: flex;
  width: max-content;
  animation: slide 30s linear infinite;
}

.slide-img {
  width: 100vw;
  flex-shrink: 0;
}

@keyframes slide {
  from {
    transform: translateX(0);
  }

  to {
    transform: translateX(-100vw);
  }
}

.font-page {
  width: 100%;
}

.section {
  width: 100%;

  display: flex;
  justify-content: center;
  align-items: center;

  margin: 250px 0;
}
.title {
  margin-top: 140px;
}

.about-text {
  margin-top: -140px;
}

 .section img {
  width: 70%;
  max-width: 1000px;
  display: block;

  //opacity: 0;
  transform: translateY(80px);
  transition: all 1s ease;//
}
//.section.show img {
  opacity: 1;
  transform: translateY(0);
}//

/* 타이틀 타이포 이미지 */
.title img {
  width: 50%;
  max-width: 400px;
}

/* 설명 텍스트 이미지 */
.about-text img {
  width: 80%;
  max-width: 800px;
}

.about-text-02{
  margin-top: -220px;
}

.about-text-03{
  margin-top: -220px;
}

.credit-section{
  width:100%;
  height:250px;

  background:#000;

  display:flex;
  justify-content:center;
  align-items:center;

  margin-top:300px;
  margin-bottom:0;
}

.credit-img{
  width:50%;
  max-width:350px;
  display:block;
}

</style>
</head>

<body>

<main class="font-page">



 <!-- 상단 바 -->
  <div class="menu-bar"></div>

  <!-- 메뉴 -->
  <a href="index.html" class="menu-wrap menu-01-wrap">
    <img src="images/menu-01.png" class="menu-img" alt="home">
  </a>

  <a href="font.html" class="menu-wrap menu-03-wrap">
    <img src="images/menu-03.png" class="menu-img" alt="archive">
    <img src="images/hover-03.png" class="hover-img" alt="">
  </a>

  <a href="about.html" class="menu-wrap menu-04-wrap">
    <img src="images/menu-04.png" class="menu-img" alt="credit">
    <img src="images/hover-04.png" class="hover-img" alt="">
  </a>



  <section class="section title">
    <img src="images/title.png" alt="타이틀">
  </section>

  <section class="section about-text">
   <img src="images/about-text-01.png">
  </section>

  <section class="section about-text about-text-02">
    <img src="images/about-text-02.png">
  </section>

  <section class="section about-text about-text-03">
    <img src="images/about-text-03.png">
  </section>



<section class="credit-section">
  <img src="images/about-credit.png" alt="credit" class="credit-img">
</section>

</main>


</body>
</html>
